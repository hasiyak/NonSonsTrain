<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <link rel="stylesheet" href="css/login.css">
</head>
<body>
    <div class="screen-container">
    <div class="left-side">
    <a href="index.html" class="logo" id="logo-name">
        <img src="assets/train-whit.png" alt="logo" class="train-logo">
        <img src="assets/Dumriya_Icon-yellow.png" alt="Dumriya logo" class="text-logo">
    </a>
    <h1>Your Journey Across Sri Lanka Begins Here</h1>
    <p>Experience the most scenic rail routes, reserve seats instantly, and manage your bookings in one place.</p>
    </div>
    <div class="right-side">
    <div class="login-card">
    <h2>Welcome Back!</h2>
    <p>Please enter your details to sign into your account</p>

    <form>
        <label for="email">Email Address</label><br>
        <input type="email" id="email" name="email" placeholder="name@example.com"><br>
  
        <label for="password">Password</label><br>
        <input type="password" id="password" name="password" placeholder="enter password here"><br>
        
  
        <input type="checkbox" id="remember" name="remember">
        <label for="remember">Remember me</label>
        <a href="#">Forgot Password?</a><br>
  
        <button type="submit">Sign In</button>
    </form>

    <p>Don't have an account? <a href="register.html">Sign Up</a></p>
    <p><a href="index.html">Back to Home</a></p>
    </div>
    </div>
    </div>

</script>

</body>
