<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Select Seats | LankaTrains</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css"> <style>
        /* Ultra-simple Seat UI Styles */
        .seat-selection-container {
            max-width: 500px;
            margin: 50px auto;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: var(--shadow);
            text-align: center;
        }

        .legend {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 30px;
            list-style: none;
            padding: 0;
        }

        .legend li {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
        }

        .seat-box {
            width: 25px;
            height: 25px;
            border-radius: 5px;
        }

        /* The Grid */
        .seat-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin-bottom: 30px;
            justify-items: center;
        }

        /* The Seat */
        .seat {
            width: 45px;
            height: 45px;
            background-color: #e2e8f0; /* Default Gray */
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            color: #64748b;
        }

        .seat:not(.occupied):hover {
            background-color: #cbd5e1;
            transform: scale(1.05);
        }

        /* States */
        .seat.selected {
            background-color: #0ea5e9; /* Blue */
            color: white;
        }

        .seat.occupied {
            background-color: #ef4444; /* Red */
            color: white;
            cursor: not-allowed;
            opacity: 0.7;
        }

        .action-buttons {
            display: flex;
            gap: 10px;
        }

        .action-buttons button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }

        .btn-book { background-color: #0ea5e9; color: white; }
        .btn-back { background-color: #e2e8f0; color: #333; }
    </style>
</head>
<body>

    <header class="scrolled">
        <div class="container nav-container">
            <a href="index.html" class="logo">
                <i class="fa-solid fa-train"></i> Lanka<span>Trains</span>
            </a>
        </div>
    </header>

    <div class="container">
        <div class="seat-selection-container">
            <h2 id="train-title">Loading Train...</h2>
            <p>Select your preferred seats below.</p>

            <ul class="legend">
                <li><div class="seat-box" style="background: #e2e8f0;"></div> Available</li>
                <li><div class="seat-box" style="background: #0ea5e9;"></div> Selected</li>
                <li><div class="seat-box" style="background: #ef4444;"></div> Booked</li>
            </ul>

            <div class="seat-grid" id="seat-grid"></div>

            <div class="action-buttons">
                <button class="btn-back" onclick="window.location.href='booking.html'">Back to Search</button>
                <button class="btn-book" id="book-btn">Confirm Booking</button>
            </div>
        </div>
    </div>

    <script src="js/seat-reservation.js"></script>
</body>
</html>
