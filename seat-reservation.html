<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Select Seats | LankaTrains</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/booking.css">
    <link rel="stylesheet" href="css/seat-reserve.css">
</head>
<body>
    <div class="container">
        <div class="seat-selection-container">
            <h2 id="train-title"></h2>
            <p style="color: #666; margin-bottom: 20px;">Select your seats below.</p>
            <ul class="legend">
                <li><div class="seat-box" style="background-color: #cbcccc;"></div> Available</li>
                <li><div class="seat-box" style="background-color: #13a2e4;"></div> Selected</li>
                <li><div class="seat-box" style="background-color: #e23b3b;"></div> Booked</li>
            </ul>
            <div class="seat-grid" id="seat-grid"></div>
            <div class="action-buttons">
                <button class="btn-back" onclick="window.location.href='booking.html'">Back to Search</button>
                <button class="btn-book" id="book-btn">Confirm Booking</button>
            </div>
        </div>
    </div>

    <script src="js/seat-reservation.js"></script>
</body>
</html>
