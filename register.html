<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | දුම්රිය</title>
    <link rel="stylesheet" href="css/register.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="mainBox">
        <div class="leftBox">
            
        </div>
        <div class="rightBox">
            <div class="formBox">
                <h2 class="creatText">Create Account</h2>
                <p class="createPara">Enter your details to create a new train ticketing account</p>
                <form action="/">
                    <label for="userName">Name</label><br>
                    <input type="text" id="userName" name="userName" class="inputBar" placeholder="Enter the name"><br>
                    <label for="email">E-mail Address</label><br>
                    <input class="inputBar" type="email" name="email" id="email" placeholder="example@gmail.com">
                    <i id="email-error"></i><br>
                    <label for="phoneNo">Phone Number</label><br>
                    <input class="inputBar" type="text" name="phoneNo" id="phoneNo" placeholder="07x xxx xxxx">
                    <i id="phoneNo-error"></i><br>
                    <label for="pass">Password</label><br>
                    <input class="inputBar" type="password" name="pass" id="pass" placeholder="New password">
                    <i id="pass-error"></i><br>
                    <label for="confirm">Confirm Password</label><br>
                    <input class="inputBar" type="password" name="confirm" id="confirm" placeholder="Re-enter the password">
                    <i id="confirm-error"></i><br>
                    <input type="checkbox" name="agreeBox" id="agreeBox">
                    <label for="agreeBox">I agree to the <a href="/">Termsof Service</a> and <a href="/">Privacy Policy</a></label>
                    <i id="condition-error"></i>
                </form>

            </div>
        </div>
    </div>
</body>
</html>
