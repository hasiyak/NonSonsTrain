<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | දුම්රිය</title>
    <link rel="stylesheet" href="css/register.css">
</head>
<body>
    <div class="screen-container">
        
        <div class="left-side">
            <a href="index.html" class="logo" id="logo-name">
                <img src="assets/train-whit.png" alt="logo" class="train-logo">
                <img src="assets/Dumriya_Icon-yellow.png" alt="Dumriya logo" class="text-logo">
            </a>
            <h1>Your Journey Across Sri Lanka Begins Here</h1>
            <p>Experience the most scenic rail routes, reserve seats instantly, and manage your bookings in one place.</p>
        </div>
        
        <div class="right-side">
            <div class="login-card">
                <h2>Create Account</h2>
                <p class="subtitle">Enter your details to create a new train ticketing account</p>
                
                <form action="/">
                    <label for="userName">Name</label>
                    <input type="text" id="userName" name="userName" placeholder="Enter the name">
                    <i id="userName-error" class="error-text"></i>
                    
                    <label for="email">E-mail Address</label>
                    <input type="email" name="email" id="email" placeholder="example@gmail.com">
                    <i id="email-error" class="error-text"></i>
                    
                    <label for="phoneNo">Phone Number</label>
                    <input type="text" name="phoneNo" id="phoneNo" placeholder="07x xxx xxxx">
                    <i id="phoneNo-error" class="error-text"></i>
                    
                    <label for="pass">Password</label>
                    <input type="password" name="pass" id="pass" placeholder="New password">
                    <i id="pass-error" class="error-text"></i>
                    
                    <label for="confirm">Confirm Password</label>
                    <input type="password" name="confirm" id="confirm" placeholder="Re-enter the password">
                    <i id="confirm-error" class="error-text"></i>
                    
                    <div class="checkbox-wrapper">
                        <input type="checkbox" name="agreeBox" id="agreeBox">
                        <label for="agreeBox">I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a></label>
                    </div>
                    <i id="condition-error" class="error-text"></i>
                    
                    <button type="submit">Sign Up</button>
                </form>

                <p class="backHome" style="margin-top: 15px;">Already have an account? <a href="login.html">Sign In</a></p>
                <p class="backHome" style="margin-top: 5px;"><a href="index.html">Back to Home</a></p>
            </div>
        </div>
        
    </div>

    <div id="toast-container"></div> 
    
    <form id="login-form" style="display: none;"></form> 
    <script src="js/login.js"></script> 
</body>
</html>
